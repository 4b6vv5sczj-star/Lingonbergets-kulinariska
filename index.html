<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5">
<meta name="theme-color" content="#10161c">
<meta name="color-scheme" content="dark">
<title>Lingonbergets kulinariska samling</title>

<!-- PWA / iOS -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lingonberget">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">

<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="app">

  <!-- ===== Top bar ===== -->
  <header class="topbar" id="topbar">
    <div class="topbar-in">
      <button class="icon-btn back-btn" id="backBtn" hidden aria-label="Tillbaka">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="brand">
        <img class="brand-logo" src="icons/icon-192.png" alt="">
        <div class="brand-text">
          <strong>Lingonberget</strong>
          <span>kulinariska samling</span>
        </div>
      </div>
      <button class="icon-btn" id="menuBtn" aria-label="Meny">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== Overflow menu ===== -->
  <div class="sheet-backdrop" id="menuBackdrop" hidden></div>
  <nav class="menu" id="menu" hidden>
    <button data-action="new">＋ Nytt recept</button>
    <button data-action="open-icloud">☁︎ Öppna recept från iCloud / Filer</button>
    <button data-action="export-all">⤓ Exportera hela samlingen (säkerhetskopia)</button>
    <button data-action="import-all">⤒ Importera samling (.json)</button>
    <a class="menu-about" data-action="about">Om appen</a>
  </nav>

  <!-- ===== View: Collection ===== -->
  <main class="view" id="view-collection">
    <div class="search-row">
      <svg class="search-ico" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="search" id="searchInput" placeholder="Sök recept, ingrediens…" autocomplete="off">
    </div>

    <div class="filters" id="filters">
      <button class="chip is-active" data-cat="all">Alla</button>
      <button class="chip" data-cat="forratt">Förrätt</button>
      <button class="chip" data-cat="huvudratt">Huvudrätt</button>
      <button class="chip" data-cat="efterratt">Efterrätt</button>
      <button class="chip" data-cat="bakverk">Bakverk</button>
      <button class="chip" data-cat="vegetariskt">Vegetariskt</button>
    </div>

    <div class="grid" id="recipeGrid"></div>

    <div class="empty" id="emptyState" hidden>
      <div class="empty-emblem">🫐</div>
      <h2>Inga recept ännu</h2>
      <p>Fotografera ett handskrivet recept, importera en PDF eller en länk från köket.se — eller skriv ett nytt.</p>
      <button class="btn btn-primary" data-action="new">Skapa ditt första recept</button>
    </div>
  </main>

  <!-- ===== View: Read ===== -->
  <main class="view" id="view-read" hidden>
    <article class="reader" id="reader"></article>
    <div class="action-bar">
      <button class="btn" data-action="save-icloud-read">☁︎ Spara till iCloud</button>
      <button class="btn btn-primary" data-action="edit">Redigera</button>
    </div>
  </main>

  <!-- ===== View: Edit ===== -->
  <main class="view" id="view-edit" hidden>
    <form id="editForm" onsubmit="return false">
      <input class="title-input" id="recipeTitle" placeholder="Receptets namn" autocomplete="off">

      <label class="field-label">Kategori</label>
      <div class="cat-picker" id="catPicker">
        <button type="button" class="cat" data-cat="forratt">Förrätt</button>
        <button type="button" class="cat" data-cat="huvudratt">Huvudrätt</button>
        <button type="button" class="cat" data-cat="efterratt">Efterrätt</button>
        <button type="button" class="cat" data-cat="bakverk">Bakverk</button>
        <button type="button" class="cat" data-cat="vegetariskt">Vegetariskt</button>
      </div>

      <label class="field-label">Bilder</label>
      <div class="gallery" id="gallery"></div>
      <div class="import-row">
        <button type="button" class="pill" data-action="add-photo">＋ Bild / kamera</button>
        <button type="button" class="pill" data-action="scan">⌁ Skanna recept (OCR)</button>
        <button type="button" class="pill" data-action="import-pdf">▤ Importera PDF</button>
        <button type="button" class="pill" data-action="import-url">⤓ Importera från länk</button>
        <button type="button" class="pill" data-action="paste">⎘ Klistra in recept</button>
      </div>

      <label class="field-label">Recept</label>
      <!-- Rich text editor (återanvänder Baltic-editorns mekanism) -->
      <div class="editor-shell">
        <div class="editor-toolbar" id="editorToolbar">
          <button type="button" data-cmd="formatBlock" data-val="H2" title="Rubrik">H</button>
          <button type="button" data-cmd="bold" title="Fet"><b>B</b></button>
          <button type="button" data-cmd="italic" title="Kursiv"><i>I</i></button>
          <button type="button" data-cmd="underline" title="Understruken"><u>U</u></button>
          <span class="tb-sep"></span>
          <button type="button" data-cmd="insertUnorderedList" title="Punktlista">•—</button>
          <button type="button" data-cmd="insertOrderedList" title="Numrerad lista">1.</button>
          <span class="tb-sep"></span>
          <button type="button" data-cmd="hiliteColor" data-val="#3a2530" title="Markera">▣</button>
          <button type="button" data-cmd="foreColor" data-val="#e6688a" title="Textfärg">A</button>
          <span class="tb-sep"></span>
          <button type="button" data-cmd="removeFormat" title="Rensa format">⌫</button>
        </div>
        <div class="editor" id="editor" contenteditable="true" spellcheck="true"
             data-placeholder="Skriv ingredienser och tillagning här. Skannad text och importer hamnar här — redigera fritt."></div>
      </div>

      <div class="action-bar">
        <button type="button" class="btn btn-danger" data-action="delete">Radera</button>
        <button type="button" class="btn" data-action="save-icloud-edit">☁︎ Spara till iCloud</button>
        <button type="button" class="btn btn-primary" data-action="save">Spara</button>
      </div>
    </form>
  </main>

  <!-- ===== Floating add button (collection) ===== -->
  <button class="fab" id="fab" data-action="new" aria-label="Nytt recept">＋</button>

  <!-- ===== Busy overlay ===== -->
  <div class="busy" id="busy" hidden>
    <div class="spinner"></div>
    <p id="busyText">Arbetar…</p>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast" id="toast" hidden></div>

  <!-- Hidden file inputs -->
  <input type="file" id="filePhoto" accept="image/*" multiple hidden>
  <input type="file" id="fileCamera" accept="image/*" capture="environment" hidden>
  <input type="file" id="filePdf" accept="application/pdf,.pdf" hidden>
  <input type="file" id="fileRecipe" accept="application/json,.json" hidden>
  <input type="file" id="fileCollection" accept="application/json,.json" hidden>
</div>

<!-- App scripts (classic order, no bundler) -->
<script src="js/store.js"></script>
<script src="js/editor.js"></script>
<script src="js/ocr.js"></script>
<script src="js/pdfimport.js"></script>
<script src="js/webimport.js"></script>
<script src="js/icloud.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }
</script>
</body>
</html>
